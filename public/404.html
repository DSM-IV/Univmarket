<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      // GitHub Pages SPA redirect
      var path = window.location.pathname;
      var repo = '/Univmarket';
      if (path.startsWith(repo)) {
        var route = path.slice(repo.length);
        window.location.replace(repo + '/?route=' + encodeURIComponent(route) + window.location.search.replace('?', '&') + window.location.hash);
      }
    </script>
  </head>
  <body></body>
</html>
