server:
  port: 8080

spring:
  # backend/.env 를 properties 형식으로 자동 로드 (gradlew bootRun 시).
  # 파일이 없으면 무시(optional). 시스템 환경변수보다 우선순위 낮음.
  config:
    import: optional:file:.env[.properties]

  # 파일 업로드 크기 제한 (자료 PDF 업로드 등)
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 55MB

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      pool-name: UnivmarketHikariCP

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: Asia/Seoul
    open-in-view: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

# Firebase Admin SDK
firebase:
  credentials-path: ${FIREBASE_CREDENTIALS_PATH:firebase-service-account.json}

# Cloudflare R2
r2:
  account-id: ${R2_ACCOUNT_ID:}
  access-key-id: ${R2_ACCESS_KEY_ID:}
  secret-access-key: ${R2_SECRET_ACCESS_KEY:}
  bucket-name: ${R2_BUCKET_NAME:univmarket}
  public-url: ${R2_PUBLIC_URL:}

# Payment Gateways
payment:
  kakaopay:
    cid: ${KAKAOPAY_CID:}
    secret-key: ${KAKAOPAY_SECRET_KEY:}
  toss:
    secret-key: ${TOSS_SECRET_KEY:}

# SMS (Aligo)
aligo:
  api-key: ${ALIGO_API_KEY:}
  user-id: ${ALIGO_USER_ID:}
  sender-key: ${ALIGO_SENDER_KEY:}
  sender-number: ${ALIGO_SENDER_NUMBER:}

# VirusTotal
virustotal:
  api-key: ${VIRUSTOTAL_API_KEY:}

# App
app:
  frontend-url: ${FRONTEND_URL:https://unifile.store}
  encryption-key: ${ENCRYPTION_KEY:}  # base64 32 byte. openssl rand -base64 32 로 생성. 절대 변경 금지
  allow-localhost-cors: ${ALLOW_LOCALHOST_CORS:false}  # 로컬 개발 전용. 운영 false 유지 필수

# Rate Limiting defaults
rate-limit:
  default-capacity: 100
  default-refill-tokens: 100
  default-refill-seconds: 60

logging:
  level:
    com.univmarket: INFO
    org.springframework.security: WARN

---
# 개발: 로컬 Docker PostgreSQL
# ⚠️ 운영 단일 VM 배포(docker-compose.deploy.yml)도 이 dev 프로파일을 쓴다 (내부망 postgres SSL 불필요).
# 따라서 localhost CORS 같은 "로컬 전용" 설정은 dev 프로파일이 아니라 별도 env var (ALLOW_LOCALHOST_CORS)로 통제할 것.
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:univmarket}
    username: ${DB_USERNAME:univmarket}
    password: ${DB_PASSWORD:devpass}

---
# 운영: 관리형 PostgreSQL (예: Supabase Seoul / Cloud SQL Seoul / Naver Cloud DB)
# SSL 강제: URL에 ?sslmode=require 또는 환경변수로 ?sslmode=verify-full
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}?sslmode=require
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
