server:
  port: 8080

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      connection-test-query: SELECT 1 FROM DUAL
      pool-name: UnivmarketHikariCP

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
        format_sql: false
        jdbc:
          time_zone: Asia/Seoul
    open-in-view: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

# Firebase Admin SDK
firebase:
  credentials-path: ${FIREBASE_CREDENTIALS_PATH:firebase-service-account.json}

# Cloudflare R2
r2:
  account-id: ${R2_ACCOUNT_ID:}
  access-key-id: ${R2_ACCESS_KEY_ID:}
  secret-access-key: ${R2_SECRET_ACCESS_KEY:}
  bucket-name: ${R2_BUCKET_NAME:univmarket}
  public-url: ${R2_PUBLIC_URL:}

# Payment Gateways
payment:
  kakaopay:
    cid: ${KAKAOPAY_CID:}
    secret-key: ${KAKAOPAY_SECRET_KEY:}
  toss:
    secret-key: ${TOSS_SECRET_KEY:}

# SMS (Aligo)
aligo:
  api-key: ${ALIGO_API_KEY:}
  user-id: ${ALIGO_USER_ID:}
  sender-key: ${ALIGO_SENDER_KEY:}
  sender-number: ${ALIGO_SENDER_NUMBER:}

# VirusTotal
virustotal:
  api-key: ${VIRUSTOTAL_API_KEY:}

# App
app:
  frontend-url: ${FRONTEND_URL:https://unifile.store}

# Rate Limiting defaults
rate-limit:
  default-capacity: 100
  default-refill-tokens: 100
  default-refill-seconds: 60

logging:
  level:
    com.univmarket: INFO
    org.springframework.security: WARN

---
# 개발: 로컬 Docker Oracle 23ai Free
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:oracle:thin:@//${DB_HOST:localhost}:${DB_PORT:1521}/${DB_SERVICE:FREEPDB1}
    username: ${DB_USERNAME:univmarket}
    password: ${DB_PASSWORD:devpass}

---
# 운영: Oracle Cloud Autonomous DB (ATP) — Wallet 기반
# TNS_ADMIN에 Wallet 디렉토리 지정, URL은 tnsnames.ora의 서비스명 사용
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:oracle:thin:@${DB_TNS_ALIAS}?TNS_ADMIN=${TNS_ADMIN}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
