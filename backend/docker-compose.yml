services:
  # Oracle Database 23ai Free (로컬 개발용)
  # 포트는 127.0.0.1에만 바인딩 — 외부 네트워크 노출 차단
  oracle:
    image: gvenzl/oracle-free:23-slim-faststart
    environment:
      ORACLE_PASSWORD: ${DB_ADMIN_PASSWORD:-changeme}
      APP_USER: univmarket
      APP_USER_PASSWORD: ${DB_PASSWORD:-devpass}
    ports:
      - "127.0.0.1:1521:1521"
    volumes:
      - oracle_data:/opt/oracle/oradata
      - ./src/main/resources/schema.sql:/container-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # Redis 캐시/Rate Limiting
  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Spring Boot 앱
  app:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      oracle:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_HOST: oracle
      DB_PORT: 1521
      DB_SERVICE: FREEPDB1
      DB_USERNAME: univmarket
      DB_PASSWORD: ${DB_PASSWORD:-devpass}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme}
      FIREBASE_CREDENTIALS_PATH: /app/firebase-service-account.json
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-univmarket}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL}
      KAKAOPAY_CID: ${KAKAOPAY_CID}
      KAKAOPAY_SECRET_KEY: ${KAKAOPAY_SECRET_KEY}
      TOSS_SECRET_KEY: ${TOSS_SECRET_KEY}
      ALIGO_API_KEY: ${ALIGO_API_KEY}
      ALIGO_USER_ID: ${ALIGO_USER_ID}
      ALIGO_SENDER_KEY: ${ALIGO_SENDER_KEY}
      ALIGO_SENDER_NUMBER: ${ALIGO_SENDER_NUMBER}
      VIRUSTOTAL_API_KEY: ${VIRUSTOTAL_API_KEY}
      FRONTEND_URL: https://unifile.store
    volumes:
      - ./firebase-service-account.json:/app/firebase-service-account.json:ro

volumes:
  oracle_data:
  redis_data:
