services:
  # PostgreSQL 16 (로컬 개발용)
  # 포트는 127.0.0.1에만 바인딩 — 외부 네트워크 노출 차단
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: univmarket
      POSTGRES_USER: univmarket
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devpass}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # schema.sql은 /docker-entrypoint-initdb.d에 넣으면 최초 부팅 시 자동 실행
      - ./src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U univmarket -d univmarket"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Redis 캐시/Rate Limiting
  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Spring Boot 앱
  app:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: univmarket
      DB_USERNAME: univmarket
      DB_PASSWORD: ${DB_PASSWORD:-devpass}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme}
      FIREBASE_CREDENTIALS_PATH: /app/firebase-service-account.json
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-univmarket}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL}
      KAKAOPAY_CID: ${KAKAOPAY_CID}
      KAKAOPAY_SECRET_KEY: ${KAKAOPAY_SECRET_KEY}
      TOSS_SECRET_KEY: ${TOSS_SECRET_KEY}
      ALIGO_API_KEY: ${ALIGO_API_KEY}
      ALIGO_USER_ID: ${ALIGO_USER_ID}
      ALIGO_SENDER_KEY: ${ALIGO_SENDER_KEY}
      ALIGO_SENDER_NUMBER: ${ALIGO_SENDER_NUMBER}
      VIRUSTOTAL_API_KEY: ${VIRUSTOTAL_API_KEY}
      FRONTEND_URL: https://unifile.store
    volumes:
      - ./firebase-service-account.json:/app/firebase-service-account.json:ro

volumes:
  postgres_data:
  redis_data:
