services:
  # PostgreSQL 16 — 내부 네트워크로만 노출 (호스트 포트 바인딩 없음)
  postgres:
    image: postgres:16-alpine
    container_name: univmarket-postgres
    environment:
      POSTGRES_DB: univmarket
      POSTGRES_USER: univmarket
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U univmarket -d univmarket"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Redis 캐시/Rate Limiting — 내부 네트워크로만 노출
  redis:
    image: redis:7-alpine
    container_name: univmarket-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Spring Boot 앱 — Caddy 뒤에 있으므로 호스트 포트 바인딩 없음
  app:
    build: .
    container_name: univmarket-app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev  # 내부망 Postgres라 sslmode=require 불필요. 네이밍만 dev, 프로덕션 배포용
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: univmarket
      DB_USERNAME: univmarket
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      FIREBASE_CREDENTIALS_PATH: /app/firebase-service-account.json
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-univmarket}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL}
      KAKAOPAY_CID: ${KAKAOPAY_CID}
      KAKAOPAY_SECRET_KEY: ${KAKAOPAY_SECRET_KEY}
      TOSS_SECRET_KEY: ${TOSS_SECRET_KEY}
      ALIGO_API_KEY: ${ALIGO_API_KEY}
      ALIGO_USER_ID: ${ALIGO_USER_ID}
      ALIGO_SENDER_KEY: ${ALIGO_SENDER_KEY}
      ALIGO_SENDER_NUMBER: ${ALIGO_SENDER_NUMBER}
      VIRUSTOTAL_API_KEY: ${VIRUSTOTAL_API_KEY}
      FRONTEND_URL: ${FRONTEND_URL:-https://unifile.store}
    volumes:
      - ./firebase-service-account.json:/app/firebase-service-account.json:ro
    restart: unless-stopped

  # Caddy 리버스 프록시 — Let's Encrypt 자동 TLS
  caddy:
    image: caddy:2-alpine
    container_name: univmarket-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
